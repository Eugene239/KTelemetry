services:
  clickhouse:
    build:
      context: ./clickhouse
    image: ghcr.io/eugene239/ktelemetry/clickhouse:master
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_DB: telemetry
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/eugene239/ktelemetry/server:master
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      HOST: 0.0.0.0
      PORT: 8080
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  clickhouse_data:
  clickhouse_logs:

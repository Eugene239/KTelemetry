name: Publish ClickHouse image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ktelemetry/clickhouse
          tags: |
            type=raw,value=master
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/clickhouse
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Make package public
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/user/packages/container/ktelemetry%2Fclickhouse" \
            -d '{"visibility":"public"}' || true

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "${{ secrets.DEPLOY_WEBHOOK_CLICKHOUSE }}" ]; then
            echo "DEPLOY_WEBHOOK_CLICKHOUSE not set, skipping."
            exit 0
          fi
          if [ -n "$DEPLOY_WEBHOOK_TOKEN" ]; then
            curl -fsSL -X GET "${{ secrets.DEPLOY_WEBHOOK_CLICKHOUSE }}" -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN"
          else
            curl -fsSL -X GET "${{ secrets.DEPLOY_WEBHOOK_CLICKHOUSE }}"
          fi
